name: Daily AI Design Content

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/collect-content.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily AI design content"
