<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 활용능력 진단 | AI Product Design Lab</title>
    <meta
      name="description"
      content="UIUX 디자이너를 위한 AI 활용능력 진단. 12문항으로 AI 툴 활용, 프롬프트 설계, 워크플로우 통합, 포트폴리오 연결 역량을 확인합니다."
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="AI Product Design Lab 홈">
        <span class="brand-mark">AI</span>
        <span>J.영의 AX Lab</span>
      </a>
      <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links detail-nav" aria-label="상세 메뉴">
        <a href="index.html">홈</a>
        <a href="index.html#level-process">프로세스</a>
        <a href="resources.html">자료실</a>
      </nav>
    </header>

    <main>
      <section class="ai-diagnosis-page" data-ai-diagnosis>
        <div class="ai-diagnosis-shell">
          <div class="ai-diagnosis-intro" data-ai-intro>
            <a class="back-link" href="index.html">← 홈으로</a>
            <p class="eyebrow">AI Skill Diagnosis</p>
            <h1>나는 AI를 얼마나<br />잘 활용하는 디자이너인가?</h1>
            <p>
              UIUX · 프로덕트 디자이너를 위한 AI 활용능력 진단입니다.
              12문항을 풀고 현재 레벨과 다음 포트폴리오 미션을 확인하세요.
            </p>
            <div class="ai-diagnosis-meta" aria-label="진단 정보">
              <span>12문항</span>
              <span>약 5분</span>
              <span>5단계 레벨</span>
            </div>
            <button class="ai-diagnosis-start" type="button" data-ai-start>진단 시작하기</button>
          </div>

          <div class="ai-diagnosis-quiz" data-ai-quiz hidden>
            <div class="ai-progress">
              <div>
                <span data-ai-progress-label>1 / 12</span>
                <b data-ai-area-chip>영역 1 · AI 툴 활용</b>
              </div>
              <i><span data-ai-progress-fill></span></i>
            </div>

            <div class="ai-question-card">
              <p class="eyebrow" data-ai-question-area>Question</p>
              <h2 data-ai-question-title></h2>
              <p data-ai-question-sub></p>
            </div>

            <div class="ai-choice-list" data-ai-choices></div>

            <div class="ai-quiz-actions">
              <button type="button" data-ai-prev>이전</button>
              <button type="button" data-ai-next disabled>다음</button>
            </div>
          </div>

          <div class="ai-diagnosis-result" data-ai-result hidden>
            <div class="ai-result-hero">
              <div class="ai-result-badge" data-ai-badge>
                <span data-ai-badge-emoji></span>
                <b data-ai-badge-level></b>
              </div>
              <p class="eyebrow">Diagnosis Result</p>
              <h1 data-ai-result-title></h1>
              <p data-ai-result-desc></p>
              <strong data-ai-result-score></strong>
            </div>

            <div class="ai-result-grid">
              <section class="ai-result-panel">
                <h2>영역별 점수</h2>
                <div class="ai-area-scores" data-ai-area-scores></div>
              </section>

              <section class="ai-result-panel">
                <h2>추천 포트폴리오 로드맵</h2>
                <div class="ai-recommend-list" data-ai-recommend-list></div>
              </section>
            </div>

            <div class="ai-result-actions">
              <button type="button" data-ai-retry>다시 진단</button>
              <button type="button" data-ai-share>결과 복사하기</button>
              <a href="index.html#level-process">레벨별 프로세스 보기</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
